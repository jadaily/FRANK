<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frank Strength</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 15px auto; padding: 12px; background: #f8fafc; color: #0f172a; }
    input, select, button { width: 100%; padding: 11px; margin: 4px 0 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; }
    button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
    .hidden { display: none !important; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .card { background: #fff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 12px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }
    .stat { background: #f8fafc; border-radius: 8px; padding: 8px; border: 1px solid #e2e8f0; }
    .stat b { display: block; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
    .stat span { font-size: 1.05rem; font-weight: bold; }
    .bar-shell { height: 8px; background: #e2e8f0; border-radius: 99px; overflow: hidden; margin-top: 8px; }
    .bar { height: 100%; background: #2563eb; width: 0%; transition: width 0.4s ease; }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div id="loginView">
      <h2>Sign In</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" required placeholder="Email" />
        <input type="password" id="loginPassword" required placeholder="Password" />
        <button type="submit">Login</button>
      </form>
      <p style="text-align:center">New? <a href="#" onclick="toggleView(false)">Create Account</a></p>
    </div>

    <div id="registerView" class="hidden">
      <h2>Create Account</h2>
      <form id="registerForm">
        <input type="text" id="registerName" required placeholder="Display Name" />
        <input type="email" id="registerEmail" required placeholder="Email" />
        <input type="password" id="registerPassword" required minlength="6" placeholder="Password (Min 6)" />
        <button type="submit">Sign Up</button>
      </form>
      <p style="text-align:center">Have an account? <a href="#" onclick="toggleView(true)">Login</a></p>
    </div>
    <div id="authError" style="color:red; text-align:center; font-weight:bold"></div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="hidden">
    <div class="header">
      <h2 id="welcome">Frank Logger</h2>
      <button onclick="logOut()" style="width:auto; margin:0; padding:5px 10px; background:#ef4444">Logout</button>
    </div>

    <form id="setForm">
      <select name="exercise"><option value="squat">Squat</option><option value="bench press">Bench Press</option><option value="deadlift">Deadlift</option></select>
      <input name="weight" type="number" placeholder="Weight (kg)" required />
      <input name="reps" type="number" placeholder="Reps" required />
      <select name="sex"><option value="male">Male</option><option value="female">Female</option></select>
      <input name="bodyweightKg" type="number" placeholder="Bodyweight (kg)" required />
      <button type="submit">Log Set</button>
    </form>

    <!-- RENDER TARGET FOR BETTER CODES -->
    <div id="resultCard" class="card hidden">
      <div style="display:flex; justify-content:space-between; font-weight:bold">
        <span style="color:#2563eb" id="outBadge">Badge: —</span>
        <span style="color:#64748b" id="outForm">Form: —</span>
      </div>
      <div class="grid">
        <div class="stat"><b>Estimated 1RM</b><span id="outRm">—</span></div>
        <div class="stat"><b>Frank Score</b><span id="outFrank">—</span></div>
        <div class="stat"><b>DOTS Points</b><span id="outDots">—</span></div>
        <div class="stat"><b>Rank Rating</b><span id="outRating">—</span></div>
      </div>
      <div style="margin-top:12px; font-size:0.8rem; color:#64748b; display:flex; justify-content:space-between">
        <span>Progress to next rank</span><span id="outProgTxt">0%</span>
      </div>
      <div class="bar-shell"><div id="outBar" class="bar"></div></div>
    </div>
  </div>

  <script>
    const url = window.location.origin, authS = document.getElementById('authScreen'), appS = document.getElementById('appScreen');
    const errBox = document.getElementById('authError'), card = document.getElementById('resultCard');

    function toggleView(showLogin) {
      errBox.textContent = '';
      document.getElementById('loginView').classList.toggle('hidden', !showLogin);
      document.getElementById('registerView').classList.toggle('hidden', showLogin);
    }

    async function api(path, data, token = '') {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${url}/${path}`, { method: 'POST', headers, body: JSON.stringify(data) });
      if (res.status === 401) logOut();
      const txt = await res.text();
      if (!res.ok) throw new Error(JSON.parse(txt).message || 'Request failed');
      return JSON.parse(txt);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const json = await api('auth/login', { email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value });
        localStorage.setItem('fTkn', json.access_token); localStorage.setItem('fName', json.user.name);
        checkSession();
      } catch (err) { errBox.textContent = err.message; }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api('auth/register', { name: document.getElementById('registerName').value, email: document.getElementById('registerEmail').value, password: document.getElementById('registerPassword').value });
        alert('Account created! Please login.'); toggleView(true);
      } catch (err) { errBox.textContent = err.message; }
    });

    document.getElementById('setForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const fd = new FormData(e.target);
        const data = { exercise: fd.get('exercise'), sex: fd.get('sex'), weight: parseFloat(fd.get('weight')), reps: parseInt(fd.get('reps')), bodyweightKg: parseFloat(fd.get('bodyweightKg')) };
        const res = await api('sets', data, localStorage.getItem('fTkn'));
        
        // Target explicit output nodes
        document.getElementById('outBadge').textContent = `Badge: ${res.badgeRank || 'Initiate'}`;
        document.getElementById('outForm').textContent = `Form: ${res.currentFormRank || 'Initiate'}`;
        document.getElementById('outRm').textContent = `${(res.estimatedOneRepMax || 0).toFixed(1)} kg`;
        document.getElementById('outFrank').textContent = (res.frankScore || 0).toFixed(0);
        document.getElementById('outDots').textContent = (res.dots || 0).toFixed(1);
        document.getElementById('outRating').textContent = (res.rating || 0).toFixed(1);
        
        const pct = Math.max(0, Math.min(100, res.badgeProgressToNextRank || 0));
        document.getElementById('outBar').style.width = `${pct}%`;
        document.getElementById('outProgTxt').textContent = `${pct.toFixed(1)}% to ${res.nextRankBoundary || 2499}`;
        
        card.classList.remove('hidden');
      } catch (err) { alert('Error: ' + err.message); }
    });

    function checkSession() {
      const token = localStorage.getItem('fTkn'); if (!token) return;
      authS.classList.add('hidden'); appS.classList.remove('hidden');
      document.getElementById('welcome').textContent = `Hello, ${localStorage.getItem('fName')} 👋`;
    }

    function logOut() {
      localStorage.clear(); card.classList.add('hidden');
      appS.classList.add('hidden'); authS.classList.remove('hidden'); toggleView(true);
    }

    checkSession();
  </script>
</body>
</html>
