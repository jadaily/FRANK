<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <title>Frank Set Logger</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
      }
      * { box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        background: linear-gradient(135deg, #eff6ff, #f8fafc);
        color: var(--text);
      }
      .app {
        max-width: 640px;
        margin: 0 auto;
        padding: 18px;
        background: var(--card);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      }
      h1 { margin-top: 0; font-size: 1.5rem; }
      p { color: var(--muted); }
      label { display: block; margin-top: 12px; font-weight: 600; font-size: 0.95rem; }
      input, select, button {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        font-size: 1rem;
      }
      button {
        margin-top: 18px;
        cursor: pointer;
        background: var(--accent);
        color: white;
        border: none;
        font-weight: 700;
      }
      pre {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        padding: 12px;
        white-space: pre-wrap;
        border-radius: 12px;
        overflow-x: auto;
      }
      .summary-card {
        background: linear-gradient(135deg, #eff6ff, #f8fbff);
        border: 1px solid #bfdbfe;
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 16px;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }
      .progress-shell {
        margin-top: 10px;
        height: 10px;
        background: #e2e8f0;
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #2563eb, #38bdf8);
        width: 0%;
        transition: width 0.3s ease;
      }
      .summary-item {
        background: white;
        border-radius: 12px;
        padding: 10px;
      }
      .summary-item strong { display: block; font-size: 0.9rem; color: var(--muted); }
      .summary-item span { display: block; margin-top: 4px; font-size: 1rem; font-weight: 700; }
      .actions { display: flex; gap: 10px; margin-top: 16px; }
      .actions button { margin-top: 0; }
      .secondary {
        background: #e2e8f0;
        color: var(--text);
      }
      .logs {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .logs li {
        padding: 10px 0;
        border-bottom: 1px solid #e2e8f0;
        font-size: 0.95rem;
      }
      .logs li:last-child { border-bottom: none; }
      .empty { color: var(--muted); }
      @media (max-width: 480px) {
        body { padding: 10px; }
        .app { padding: 14px; border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Frank Set Logger</h1>
      <p>Log a set quickly from your phone or browser.</p>

      <div id="summary" class="summary-card">
        <strong>Latest result</strong>
        <div id="rankBadge" style="margin-top: 8px; font-weight: 700; color: #2563eb;">Badge: —<br/>Current Form: —</div>
        <div id="frankSummary" style="margin-top: 10px; font-size: 0.95rem; color: var(--muted);">FRANK Score: —</div>
        <div class="summary-grid">
          <div class="summary-item"><strong>1RM</strong><span>—</span></div>
          <div class="summary-item"><strong>Rank Score</strong><span>—</span></div>
          <div class="summary-item"><strong>Delta</strong><span>—</span></div>
          <div class="summary-item"><strong>DOTS</strong><span>—</span></div>
        </div>
        <div style="margin-top: 10px; font-size: 0.9rem; color: var(--muted);">Progress to next rank</div>
        <div class="progress-shell"><div id="progressBar" class="progress-bar"></div></div>
        <div id="progressText" style="margin-top: 6px; font-size: 0.85rem; color: var(--muted);">0%</div>
      </div>

      <form id="setForm">
        <label>User ID</label>
        <input name="userId" value="user-1" />

        <label>Exercise</label>
        <select name="exercise">
          <option value="squat">squat</option>
          <option value="bench press">bench press</option>
          <option value="deadlift">deadlift</option>
        </select>

        <label>Weight</label>
        <input name="weight" type="number" value="100" />

        <label>Reps</label>
        <input name="reps" type="number" value="5" />

        <label>Sex</label>
        <select name="sex">
          <option value="male">male</option>
          <option value="female">female</option>
        </select>

        <label>Bodyweight (kg)</label>
        <input name="bodyweightKg" type="number" value="80" />

        <div class="actions">
          <button type="submit">Log Set</button>
          <button type="button" id="clearForm" class="secondary">Clear</button>
        </div>
      </form>

      <h2>Response</h2>
      <pre id="response">Waiting...</pre>

      <h2>Recent Logs</h2>
      <ul id="recentLogs" class="logs">
        <li class="empty">No logs yet.</li>
      </ul>
    </div>

    <script>
      const form = document.getElementById('setForm');
      const response = document.getElementById('response');
      const summary = document.getElementById('summary');
      const recentLogs = document.getElementById('recentLogs');
      const clearButton = document.getElementById('clearForm');
      const rankBadge = document.getElementById('rankBadge');
      const frankSummary = document.getElementById('frankSummary');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const storageKey = 'frankRecentLogs';

      function resetForm() {
        form.reset();
        const userIdInput = form.querySelector('[name="userId"]');
        if (userIdInput) {
          userIdInput.value = 'user-1';
        }
      }

      function validateForm(data) {
        const errors = [];
        if (!data.userId) {
          errors.push('User ID is required.');
        }
        if (!Number.isFinite(data.weight) || data.weight <= 0) {
          errors.push('Weight must be a positive number.');
        }
        if (!Number.isFinite(data.reps) || data.reps <= 0 || data.reps > 12) {
          errors.push('Reps must be between 1 and 12.');
        }
        if (!Number.isFinite(data.bodyweightKg) || data.bodyweightKg <= 0) {
          errors.push('Bodyweight must be a positive number.');
        }
        if (!['squat', 'bench press', 'deadlift'].includes(data.exercise)) {
          errors.push('Exercise is invalid.');
        }
        if (!['male', 'female'].includes(data.sex)) {
          errors.push('Sex is invalid.');
        }
        return errors;
      }

      function renderRecentLogs() {
        const logs = JSON.parse(localStorage.getItem(storageKey) || '[]');
        if (!logs.length) {
          recentLogs.innerHTML = '<li class="empty">No logs yet.</li>';
          return;
        }

        recentLogs.innerHTML = logs
          .map((entry) => {
            const result = entry.result || {};
            return `<li><strong>${entry.exercise}</strong> · ${entry.weight}kg × ${entry.reps} · ${entry.timestamp}<br/>1RM ${result.estimatedOneRepMax?.toFixed(1) ?? '—'} · Rating ${result.rating?.toFixed(1) ?? '—'}</li>`;
          })
          .join('');
      }

      function updateSummary(result) {
        const items = summary.querySelectorAll('.summary-item span');
        if (items.length >= 4) {
          items[0].textContent = result.estimatedOneRepMax?.toFixed(1) ?? '—';
          items[1].textContent = result.rankScore?.toFixed(1) ?? '—';
          items[2].textContent = result.delta?.toFixed(2) ?? '—';
          items[3].textContent = result.dots?.toFixed(1) ?? '—';
        }

        if (rankBadge) {
          const badgeRank = result.badgeRank || result.rank || result.rankName || '—';
          const currentFormRank = result.currentFormRank || '—';
          rankBadge.innerHTML = `Badge: <strong>${badgeRank}</strong><br/>Current Form: <span>${currentFormRank}</span>`;
        }

        if (frankSummary) {
          const peak = result.peakFrankScore ?? result.frankScore ?? 0;
          const current = result.currentFrankScore ?? result.frankScore ?? 0;
          frankSummary.textContent = `FRANK Score: ${result.frankScore?.toFixed(1) ?? '—'} · Peak ${peak.toFixed(1)} · Current ${current.toFixed(1)}`;
        }

        if (progressBar && progressText) {
          const progress = Math.max(0, Math.min(100, Number(result.badgeProgressToNextRank ?? result.progressToNextRank ?? result.progress ?? 0)));
          progressBar.style.width = `${progress}%`;
          const nextBoundary = result.nextRankBoundary ?? result.nextBoundary ?? '—';
          progressText.textContent = `${progress.toFixed(1)}% to ${nextBoundary}`;
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        data.weight = Number.parseFloat(data.weight);
        data.reps = Number.parseInt(data.reps, 10);
        data.bodyweightKg = Number.parseFloat(data.bodyweightKg);
        data.exercise = data.exercise || 'squat';
        data.sex = data.sex || 'male';
        data.userId = String(data.userId || 'user-1').trim();

        const validationErrors = validateForm(data);
        if (validationErrors.length) {
          response.textContent = validationErrors.join('\n');
          return;
        }

        response.textContent = 'Sending...';

        try {
          const baseUrl = window.location.origin;
          const res = await fetch(`${baseUrl}/sets`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          const text = await res.text();
          if (!res.ok) {
            let message = `Request failed with status ${res.status}`;
            try {
              const payload = JSON.parse(text);
              message = payload.error?.message || payload.message || JSON.stringify(payload);
            } catch {
              message = text || message;
            }
            throw new Error(message);
          }

          try {
            const json = JSON.parse(text);
            response.textContent = JSON.stringify(json, null, 2);
            updateSummary(json);

            const logs = JSON.parse(localStorage.getItem(storageKey) || '[]');
            logs.unshift({
              ...data,
              result: json,
              timestamp: new Date().toLocaleString()
            });
            localStorage.setItem(storageKey, JSON.stringify(logs.slice(0, 5)));
            renderRecentLogs();
            resetForm();
          } catch {
            response.textContent = text;
          }
        } catch (err) {
          response.textContent = 'Error: ' + err.message;
        }
      });

      clearButton.addEventListener('click', () => {
        resetForm();
        response.textContent = 'Waiting...';
      });

      renderRecentLogs();
    </script>
  </body>
</html>
