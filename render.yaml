services:
  - type: web
    name: frank-strength-ranking-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: frank-postgres-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

databases:
  - name: frank-postgres-db
    plan: free
    postgresMajorVersion: 16
